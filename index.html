<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel = "Stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="maindiv">
            <h1>Simple Calculator</h1>
                <input type="text" class="input" id="input">
               <div class="btns">
                <button>C</button>
                <button>/</button>
                <button>*</button>
                <button>-</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>+</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button id = "output">=</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
            </div>
                        </div>
        </header>
        <script src="vanilla.js"></script>
</body>
</html>
